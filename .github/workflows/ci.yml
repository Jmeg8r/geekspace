name: CI

# Runs the verify suite (typecheck + scheduler tests) on every PR and on main.
# Use the "Typecheck & tests" check as a required status check in main's ruleset.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & tests
    runs-on: ubuntu-latest
    env:
      # verify only runs tsc + vitest — no need to download the Electron binary.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      # Actions pinned to commit SHAs (supply-chain hardening); bumped by Dependabot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + tests)
        run: npm run verify
