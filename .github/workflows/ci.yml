name: CI

# Runs the verify suite (typecheck + scheduler tests) on every PR and on main.
# Use the "Typecheck & tests" check as a required status check in main's ruleset.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & tests
    runs-on: ubuntu-latest
    env:
      # verify only runs tsc + vitest — no need to download the Electron binary.
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + tests)
        run: npm run verify
